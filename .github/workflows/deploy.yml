name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci-check:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Wait for backend-pytest
        uses: lewagon/wait-on-check-action@v1.5.0
        with:
          ref: ${{ github.sha }}
          check-name: backend-pytest
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

      - name: Wait for frontend-lint-unit
        uses: lewagon/wait-on-check-action@v1.5.0
        with:
          ref: ${{ github.sha }}
          check-name: frontend-lint-unit
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

  deploy:
    name: Deploy to EC2
    needs: ci-check
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            cd ${{ vars.DEPLOY_PATH || '/home/ubuntu/Agentic-pm-twin' }}
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            docker compose -f docker-compose.prod.yml up --build -d
            docker image prune -f

      - name: Health check
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          for i in $(seq 1 18); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "http://${EC2_HOST}/api/health" 2>/dev/null || true)
            if [ "$status" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i/18: status=$status, retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 90s"
          exit 1
