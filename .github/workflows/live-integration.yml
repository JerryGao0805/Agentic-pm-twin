name: Live Integration

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"
  push:
    branches:
      - main

jobs:
  live-integration-preflight:
    name: live-integration-preflight
    runs-on: ubuntu-latest
    environment: integration
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
    steps:
      - name: Validate required integration secrets and variables
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${MYSQL_ROOT_PASSWORD:-}" ]]; then
            echo "::error::Missing required environment secret MYSQL_ROOT_PASSWORD (environment: integration)."
            exit 1
          fi

          if [[ -z "${OPENAI_API_KEY:-}" ]]; then
            echo "::error::Missing required environment secret OPENAI_API_KEY (environment: integration)."
            exit 1
          fi

          if [[ -z "${OPENAI_MODEL:-}" ]]; then
            echo "::error::Missing required environment variable OPENAI_MODEL (environment: integration)."
            exit 1
          fi

  backend-live-integration:
    name: backend-live-integration
    runs-on: ubuntu-latest
    environment: integration
    needs: live-integration-preflight
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: pm_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -p$MYSQL_ROOT_PASSWORD --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    defaults:
      run:
        working-directory: backend
    env:
      RUN_LIVE_TESTS: "1"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      DB_HOST: 127.0.0.1
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
      DB_NAME: pm_db
      DB_ADMIN_USER: root
      DB_ADMIN_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync backend dependencies
        run: uv sync --all-groups --frozen

      - name: Run live integration tests
        run: uv run pytest -q -m live
